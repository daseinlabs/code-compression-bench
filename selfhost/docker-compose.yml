# Self-hosted compression proxies for the open-source PROXY arms.
#
# Each service is an API-speaking endpoint that compresses the prompt
# server-side and forwards to the underlying model (MODEL via OPENAI_BASE_URL /
# OPENAI_API_KEY, or the Anthropic-native upstream for headroom). The bench
# ProxyArm for each points at the matching *_BASE_URL from .env (defaults below):
#   edgee    -> EDGEE_BASE_URL    (default http://127.0.0.1:8801)
#   headroom -> HEADROOM_BASE_URL (default http://127.0.0.1:8787 — Headroom's
#               real default proxy port; Anthropic-native, listens on 8787)
#
# NOT a proxy (no service here): rtk is the rtk-ai/rtk CLI binary run as a Claude
# Code PreToolUse hook (Bash <cmd> -> rtk <cmd>); install the binary on the runner,
# the model goes straight to the gateway. See arms/rtk.py + arms/README.md.
#
# These are SKELETONS. Replace `image:` (or add a `build:` context) with each
# project's published image and wire its real config. Run: `make selfhost-up`.

services:
  edgee:
    # Edgee — open-source Rust gateway. TODO: pin the real image / build context.
    image: edgee/edgee:latest
    ports:
      - "8801:8080"
    environment:
      # forward target: the shared model endpoint every arm uses
      UPSTREAM_BASE_URL: "${OPENAI_BASE_URL}"
      UPSTREAM_API_KEY: "${OPENAI_API_KEY}"
      MODEL: "${MODEL}"
      COMPRESSION_TARGET_RATIO: "${COMPRESSION_TARGET_RATIO:-0.5}"
    restart: unless-stopped

  # NB: no `rtk` service. rtk (rtk-ai/rtk) is NOT a proxy — it is a CLI binary run
  # as a Claude Code PreToolUse hook (Bash <cmd> -> rtk <cmd>), installed on the
  # runner box, not stood up here. See arms/rtk.py.

  headroom:
    # Headroom — open-source, Anthropic-native reversible compression
    # (github.com/chopratejas/headroom, PyPI headroom-ai). Its proxy speaks the
    # Anthropic Messages API and listens on its real default port 8787.
    # TODO: pin the real image / build context (or build from the PyPI package).
    image: headroom/headroom:latest
    # In-container: `headroom proxy --port 8787 --mode token
    #               --anthropic-api-url ${ANTHROPIC_TARGET_API_URL}`
    command: ["proxy", "--port", "8787", "--mode", "token", "--anthropic-api-url", "${ANTHROPIC_TARGET_API_URL}"]
    ports:
      - "8787:8787"
    environment:
      # UPSTREAM is the run's gateway (Anthropic-native), NOT a LiteLLM/OpenAI knob.
      ANTHROPIC_TARGET_API_URL: "${ANTHROPIC_TARGET_API_URL}"
    restart: unless-stopped
