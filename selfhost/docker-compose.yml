# Self-hosted compression proxies for the open-source arms.
#
# Each service is an OpenAI-compatible endpoint that compresses the prompt
# server-side and forwards to the underlying model (MODEL via OPENAI_BASE_URL /
# OPENAI_API_KEY). The bench ProxyArm for each points at the matching
# *_BASE_URL from .env (defaults below):
#   edgee    -> EDGEE_BASE_URL    (default http://127.0.0.1:8801)
#   rtk      -> RTK_BASE_URL      (default http://127.0.0.1:8802)
#   headroom -> HEADROOM_BASE_URL (default http://127.0.0.1:8803)
#
# These are SKELETONS. Replace `image:` (or add a `build:` context) with each
# project's published image and wire its real config. Run: `make selfhost-up`.

services:
  edgee:
    # Edgee — open-source Rust gateway. TODO: pin the real image / build context.
    image: edgee/edgee:latest
    ports:
      - "8801:8080"
    environment:
      # forward target: the shared model endpoint every arm uses
      UPSTREAM_BASE_URL: "${OPENAI_BASE_URL}"
      UPSTREAM_API_KEY: "${OPENAI_API_KEY}"
      MODEL: "${MODEL}"
      COMPRESSION_TARGET_RATIO: "${COMPRESSION_TARGET_RATIO:-0.5}"
    restart: unless-stopped

  rtk:
    # RTK — open-source CLI proxy. TODO: pin the real image / build context.
    image: rtk/proxy:latest
    ports:
      - "8802:8080"
    environment:
      UPSTREAM_BASE_URL: "${OPENAI_BASE_URL}"
      UPSTREAM_API_KEY: "${OPENAI_API_KEY}"
      MODEL: "${MODEL}"
      COMPRESSION_TARGET_RATIO: "${COMPRESSION_TARGET_RATIO:-0.5}"
    restart: unless-stopped

  headroom:
    # Headroom — open-source, LiteLLM-native reversible compression.
    # TODO: pin the real image / build context.
    image: headroom/headroom:latest
    ports:
      - "8803:8080"
    environment:
      UPSTREAM_BASE_URL: "${OPENAI_BASE_URL}"
      UPSTREAM_API_KEY: "${OPENAI_API_KEY}"
      MODEL: "${MODEL}"
      COMPRESSION_TARGET_RATIO: "${COMPRESSION_TARGET_RATIO:-0.5}"
    restart: unless-stopped
